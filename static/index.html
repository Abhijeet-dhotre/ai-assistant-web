<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #2a2a4a;
        }

        header h1 { font-size: 1.5rem; font-weight: 600; color: #fff; letter-spacing: 1px; }
        header p { font-size: 0.85rem; color: #888; margin-top: 4px; }

        .status-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 20px; font-size: 0.8rem; color: #aaa;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4caf50; animation: pulse-dot 2s infinite;
        }
        .status-dot.error { background: #f44336; animation: none; }
        .status-dot.busy { background: #ff9800; animation: pulse-dot 0.5s infinite; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
        }

        .main-container {
            flex: 1; width: 100%; max-width: 700px;
            display: flex; flex-direction: column; padding: 20px;
        }

        .chat-area {
            flex: 1; overflow-y: auto; padding: 10px 0;
            display: flex; flex-direction: column; gap: 16px; min-height: 300px;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .message {
            max-width: 85%; padding: 14px 18px; border-radius: 16px;
            font-size: 0.95rem; line-height: 1.5;
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            color: #fff; border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e3a; border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px; opacity: 0.6;
        }

        .message .text { word-wrap: break-word; }
        .message .latency { font-size: 0.7rem; color: #666; margin-top: 6px; }

        .controls {
            display: flex; flex-direction: column;
            align-items: center; padding: 20px 0; gap: 12px;
        }

        .controls-row {
            display: flex; align-items: center; gap: 20px;
        }

        .mic-button {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid #333; background: #1a1a2e; color: #fff;
            font-size: 2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; outline: none;
        }

        .mic-button:hover { border-color: #1a73e8; background: #1e2a4a; transform: scale(1.05); }
        .mic-button.recording { border-color: #f44336; background: #2a1010; animation: pulse-ring 1.5s infinite; }
        .mic-button.recording .mic-icon { color: #f44336; }
        .mic-button.processing { border-color: #ff9800; pointer-events: none; }
        .mic-button.disabled { border-color: #333; opacity: 0.4; cursor: not-allowed; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(244,67,54,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(244,67,54,0); }
            100% { box-shadow: 0 0 0 0 rgba(244,67,54,0); }
        }

        .mic-icon { font-size: 2rem; color: #aaa; transition: color 0.2s; }
        .mic-label { font-size: 0.8rem; color: #666; text-align: center; }

        .recording-timer {
            font-size: 0.9rem; color: #f44336;
            font-variant-numeric: tabular-nums; display: none;
        }
        .recording-timer.active { display: block; }

        .waveform { display: none; gap: 3px; align-items: center; height: 30px; }
        .waveform.active { display: flex; }
        .waveform .bar {
            width: 3px; background: #f44336; border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }
        .waveform .bar:nth-child(1) { animation-delay: 0.0s; height: 10px; }
        .waveform .bar:nth-child(2) { animation-delay: 0.1s; height: 20px; }
        .waveform .bar:nth-child(3) { animation-delay: 0.2s; height: 15px; }
        .waveform .bar:nth-child(4) { animation-delay: 0.3s; height: 25px; }
        .waveform .bar:nth-child(5) { animation-delay: 0.1s; height: 18px; }
        .waveform .bar:nth-child(6) { animation-delay: 0.4s; height: 22px; }
        .waveform .bar:nth-child(7) { animation-delay: 0.2s; height: 12px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.5); }
        }

        .upload-area { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .upload-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: 2px solid #333; background: #1a1a2e; color: #aaa;
            font-size: 1.4rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; outline: none;
        }
        .upload-btn:hover { border-color: #4caf50; background: #1a2e1a; color: #4caf50; transform: scale(1.05); }
        .upload-btn.processing { border-color: #ff9800; pointer-events: none; }

        .upload-label { font-size: 0.7rem; color: #555; }

        .error-message {
            background: #2a1010; border: 1px solid #5a2020;
            color: #f44336; padding: 10px 16px; border-radius: 8px;
            font-size: 0.85rem; text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }

        .welcome { text-align: center; padding: 60px 20px; color: #555; }
        .welcome .icon { font-size: 4rem; margin-bottom: 16px; }
        .welcome p { font-size: 0.95rem; line-height: 1.6; }

        .divider { font-size: 0.75rem; color: #444; }

        .ws-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px;
        }
        .ws-badge.connected { background: #1b3a1b; color: #4caf50; }
        .ws-badge.disconnected { background: #3a1b1b; color: #f44336; }

        .stage-indicator {
            font-size: 0.75rem; color: #888; text-align: center;
            min-height: 1.2em; transition: color 0.2s;
        }
        .stage-indicator.active { color: #ff9800; }

        @media (max-width: 480px) {
            header h1 { font-size: 1.2rem; }
            .message { max-width: 92%; padding: 12px 14px; font-size: 0.9rem; }
            .mic-button { width: 70px; height: 70px; }
            .upload-btn { width: 48px; height: 48px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Voice Assistant</h1>
        <p>Whisper + Groq + Pocket TTS
            <span class="ws-badge disconnected" id="wsBadge">WS</span>
        </p>
    </header>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeMsg">
                <div class="icon">&#127908;</div>
                <p>Tap the microphone to speak, or upload an audio file.<br>
                Responses stream in real-time via WebSocket.</p>
            </div>
        </div>

        <div class="controls">
            <div class="recording-timer" id="recordingTimer">0:00</div>
            <div class="waveform" id="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="stage-indicator" id="stageIndicator"></div>
            <div class="controls-row">
                <div class="upload-area">
                    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                        &#128190;
                    </button>
                    <div class="upload-label">Upload</div>
                </div>
                <div class="divider">or</div>
                <div class="upload-area">
                    <button class="mic-button" id="micButton" onclick="toggleRecording()">
                        <span class="mic-icon">&#127908;</span>
                    </button>
                    <div class="mic-label" id="micLabel">Tap to speak</div>
                </div>
            </div>
            <input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.ogg,.webm,.m4a,.flac" style="display:none">
        </div>
    </div>

    <script>
        // ================= CONFIG =================
        const WS_PORT = 5051;
        const WS_URL = `ws://${location.hostname}:${WS_PORT}/ws`;

        // ================= STATE =================
        let ws = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let timerInterval = null;
        let micAvailable = true;
        let startTime = null;

        // Audio queue for sequential playback
        const audioQueue = [];
        let isPlaying = false;

        // Current streaming message
        let currentMsgDiv = null;
        let currentMsgText = '';

        // ================= ELEMENTS =================
        const chatArea = document.getElementById('chatArea');
        const micButton = document.getElementById('micButton');
        const micLabel = document.getElementById('micLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const recordingTimer = document.getElementById('recordingTimer');
        const waveform = document.getElementById('waveform');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const wsBadge = document.getElementById('wsBadge');
        const stageIndicator = document.getElementById('stageIndicator');

        // ================= WEBSOCKET =================

        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                wsBadge.textContent = 'WS';
                wsBadge.className = 'ws-badge connected';
                setStatus('Ready');
            };

            ws.onclose = () => {
                wsBadge.className = 'ws-badge disconnected';
                setStatus('Disconnected', 'error');
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => {
                setStatus('WS error', 'error');
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleWSMessage(msg);
            };
        }

        function handleWSMessage(msg) {
            switch (msg.type) {
                case 'status':
                    setStage(msg.message, true);
                    if (msg.stage === 'stt') setStatus('Transcribing...', 'busy');
                    if (msg.stage === 'llm') setStatus('Thinking...', 'busy');
                    if (msg.stage === 'tts') setStatus('Speaking...', 'busy');
                    break;

                case 'transcription':
                    if (welcomeMsg) welcomeMsg.style.display = 'none';
                    addMessage('user', msg.text);
                    break;

                case 'llm_token':
                    appendStreamingText(msg.token);
                    break;

                case 'tts_audio':
                    enqueueAudio(msg.audio_base64, msg.index);
                    break;

                case 'done':
                    finalizeStreamingMessage();
                    const latency = startTime ? ((Date.now() - startTime) / 1000).toFixed(1) : '?';
                    addLatencyToLastMessage(latency);
                    setStage('');
                    setStatus('Ready');
                    resetButtons();
                    break;

                case 'error':
                    addError(msg.message);
                    setStatus('Error', 'error');
                    setStage('');
                    resetButtons();
                    break;
            }
        }

        // ================= STREAMING TEXT =================

        function appendStreamingText(token) {
            if (!currentMsgDiv) {
                currentMsgDiv = createMessageShell('assistant');
            }
            currentMsgText += token;
            const textEl = currentMsgDiv.querySelector('.text');
            if (textEl) textEl.textContent = currentMsgText;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function finalizeStreamingMessage() {
            currentMsgDiv = null;
            currentMsgText = '';
        }

        // ================= AUDIO QUEUE =================

        function enqueueAudio(b64, index) {
            const bytes = base64ToUint8(b64);
            const blob = new Blob([bytes], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            audioQueue.push({ url, index });

            // Add audio player to the last assistant message
            if (currentMsgDiv) {
                let playerDiv = currentMsgDiv.querySelector('.audio-player');
                if (!playerDiv) {
                    playerDiv = document.createElement('div');
                    playerDiv.className = 'audio-player';
                    currentMsgDiv.appendChild(playerDiv);
                }
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.preload = 'auto';
                audio.src = url;
                audio.style.width = '100%';
                audio.style.height = '36px';
                audio.style.borderRadius = '18px';
                audio.style.marginTop = '6px';
                playerDiv.appendChild(audio);
            }

            if (!isPlaying) playNextAudio();
        }

        function playNextAudio() {
            if (audioQueue.length === 0) { isPlaying = false; return; }
            isPlaying = true;

            // Sort by index to maintain order
            audioQueue.sort((a, b) => a.index - b.index);
            const item = audioQueue.shift();

            const audio = new Audio(item.url);
            audio.onended = () => {
                URL.revokeObjectURL(item.url);
                playNextAudio();
            };
            audio.onerror = () => playNextAudio();
            audio.play().catch(() => playNextAudio());
        }

        function base64ToUint8(b64) {
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        // ================= RECORDING =================

        async function toggleRecording() {
            if (!micAvailable || (ws && ws.readyState !== WebSocket.OPEN)) return;
            if (isRecording) stopRecording();
            else await startRecording();
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                micAvailable = false;
                micButton.classList.add('disabled');
                micButton.onclick = null;
                micLabel.textContent = 'Mic blocked';
                setStatus('Mic unavailable - use upload', 'error');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    stream.getTracks().forEach(t => t.stop());
                    await sendAudio(blob);
                };

                mediaRecorder.start(100);
                isRecording = true;
                micButton.classList.add('recording');
                micLabel.textContent = 'Tap to stop';
                waveform.classList.add('active');
                startTimer();
                setStatus('Listening...', 'busy');
            } catch (err) {
                stream.getTracks().forEach(t => t.stop());
                addError('Recorder error: ' + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            isRecording = false;
            micButton.classList.remove('recording');
            micButton.classList.add('processing');
            uploadBtn.classList.add('processing');
            micLabel.textContent = 'Processing...';
            waveform.classList.remove('active');
            stopTimer();
            startTime = Date.now();
        }

        // ================= FILE UPLOAD =================

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadBtn.classList.add('processing');
                micButton.classList.add('processing');
                startTime = Date.now();
                sendAudio(file);
            }
            fileInput.value = '';
        });

        // ================= SEND AUDIO VIA WS =================

        async function sendAudio(blob) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addError('WebSocket not connected');
                resetButtons();
                return;
            }

            try {
                const buf = await blob.arrayBuffer();
                ws.send(buf);
            } catch (err) {
                addError('Send error: ' + err.message);
                resetButtons();
            }
        }

        // ================= UI HELPERS =================

        function setStatus(text, type = 'ok') {
            statusText.textContent = text;
            statusDot.className = 'status-dot';
            if (type === 'error') statusDot.classList.add('error');
            else if (type === 'busy') statusDot.classList.add('busy');
        }

        function setStage(text, active = false) {
            stageIndicator.textContent = text;
            stageIndicator.className = 'stage-indicator' + (active ? ' active' : '');
        }

        function startTimer() {
            recordingStartTime = Date.now();
            recordingTimer.classList.add('active');
            timerInterval = setInterval(() => {
                const el = (Date.now() - recordingStartTime) / 1000;
                const m = Math.floor(el / 60);
                const s = Math.floor(el % 60);
                recordingTimer.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            recordingTimer.classList.remove('active');
            recordingTimer.textContent = '0:00';
        }

        function resetButtons() {
            micButton.classList.remove('processing', 'recording');
            uploadBtn.classList.remove('processing');
            micLabel.textContent = micAvailable ? 'Tap to speak' : 'Mic blocked';
            waveform.classList.remove('active');
        }

        function createMessageShell(role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div><div class="text"></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function addMessage(role, text, audioUrl = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            let html = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div>`;
            html += `<div class="text">${escapeHtml(text)}</div>`;
            if (audioUrl) {
                html += `<div class="audio-player"><audio controls preload="auto" src="${audioUrl}"></audio></div>`;
            }
            div.innerHTML = html;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLatencyToLastMessage(latency) {
            const msgs = chatArea.querySelectorAll('.message.assistant');
            const last = msgs[msgs.length - 1];
            if (last) {
                let el = last.querySelector('.latency');
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'latency';
                    last.appendChild(el);
                }
                el.textContent = `${latency}s total`;
            }
        }

        function addError(text) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ================= INIT =================
        connectWS();
    </script>
</body>
</html>

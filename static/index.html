<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 16px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #2a2a4a;
        }

        header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; letter-spacing: 1px; }

        header .sub {
            font-size: 0.8rem; color: #888; margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .ws-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
        }
        .ws-badge.on  { background: #1b3a1b; color: #4caf50; }
        .ws-badge.off { background: #3a1b1b; color: #f44336; }

        .main-container {
            flex: 1; width: 100%; max-width: 700px;
            display: flex; flex-direction: column; padding: 16px 20px;
        }

        .chat-area {
            flex: 1; overflow-y: auto; padding: 8px 0;
            display: flex; flex-direction: column; gap: 14px;
            min-height: 200px;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 14px;
            font-size: 0.93rem; line-height: 1.5;
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            color: #fff; border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e3a; border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px; opacity: 0.5;
        }

        .message .text { word-wrap: break-word; }
        .message .latency { font-size: 0.65rem; color: #555; margin-top: 4px; }

        .bottom-bar {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 20px 24px; gap: 10px;
        }

        .controls-row { display: flex; align-items: center; gap: 16px; }

        .upload-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid #333; background: #111; color: #666;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; outline: none;
        }
        .upload-btn:hover { border-color: #4caf50; color: #4caf50; }

        .mic-orb {
            width: 72px; height: 72px; border-radius: 50%;
            border: 3px solid #333; background: #111;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; outline: none;
            position: relative;
        }

        .mic-orb .icon { font-size: 1.8rem; transition: color 0.3s; }

        .mic-orb.state-init    { border-color: #555; }
        .mic-orb.state-init .icon { color: #555; }

        .mic-orb.state-idle    { border-color: #4caf50; box-shadow: 0 0 12px rgba(76,175,80,0.25); }
        .mic-orb.state-idle .icon { color: #4caf50; }

        .mic-orb.state-recording {
            border-color: #f44336; animation: pulse-rec 1s infinite;
        }
        .mic-orb.state-recording .icon { color: #f44336; }

        .mic-orb.state-processing { border-color: #ff9800; animation: pulse-proc 1.5s infinite; }
        .mic-orb.state-processing .icon { color: #ff9800; }

        .mic-orb.state-speaking {
            border-color: #2196f3; box-shadow: 0 0 16px rgba(33,150,243,0.3);
        }
        .mic-orb.state-speaking .icon { color: #2196f3; }

        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.4); }
            70% { box-shadow: 0 0 0 18px rgba(244,67,54,0); }
        }

        @keyframes pulse-proc {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,152,0,0.3); }
            70% { box-shadow: 0 0 0 14px rgba(255,152,0,0); }
        }

        .status-label {
            font-size: 0.78rem; color: #888; text-align: center;
            min-height: 1.2em; transition: color 0.2s;
        }
        .status-label.recording  { color: #f44336; }
        .status-label.speaking   { color: #2196f3; }
        .status-label.processing { color: #ff9800; }

        .error-message {
            background: #2a1010; border: 1px solid #5a2020;
            color: #f44336; padding: 10px 14px; border-radius: 8px;
            font-size: 0.82rem; text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }

        .debug-log {
            background: #111; border: 1px solid #222; color: #4caf50;
            padding: 8px 12px; border-radius: 8px;
            font-size: 0.7rem; font-family: monospace;
            max-height: 120px; overflow-y: auto;
            width: 100%; max-width: 700px; margin: 0 20px;
        }

        .welcome { text-align: center; padding: 50px 20px; color: #555; }
        .welcome .icon { font-size: 3.5rem; margin-bottom: 12px; }
        .welcome p { font-size: 0.9rem; line-height: 1.6; }

        @media (max-width: 480px) {
            header h1 { font-size: 1.15rem; }
            .message { max-width: 92%; padding: 10px 13px; font-size: 0.88rem; }
            .mic-orb { width: 64px; height: 64px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Voice Assistant</h1>
        <div class="sub">
            Whisper + Groq + Pocket TTS
            <span class="ws-badge off" id="wsBadge">WS</span>
        </div>
    </header>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeMsg">
                <div class="icon">&#127908;</div>
                <p>Always listening. Just speak naturally.<br>
                Click the orb while I'm speaking to interrupt.</p>
            </div>
        </div>
    </div>

    <div class="debug-log" id="debugLog"></div>

    <div class="bottom-bar">
        <div class="status-label" id="statusLabel">Connecting...</div>
        <div class="controls-row">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Upload audio">
                &#128190;
            </button>
            <button class="mic-orb state-init" id="micOrb" onclick="onOrbClick()">
                <span class="icon">&#127908;</span>
            </button>
        </div>
        <input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.ogg,.webm,.m4a,.flac" style="display:none">
    </div>

    <script>
        // ================= CONFIG =================
        const WS_PORT = 5051;
        const WS_URL  = `ws://${location.hostname}:${WS_PORT}/ws`;

        const ENERGY_THRESHOLD = 0.01;
        const SILENCE_MS       = 800;
        const MIN_SPEECH_MS    = 300;
        const BUFFER_SECS      = 1.5;

        // ================= STATE =================
        let appState = 'init';
        let ws = null;
        let audioCtx = null;
        let processor = null;
        let micStream = null;
        let actualSampleRate = 16000;

        let allBuffers = [];
        let totalSamples = 0;
        let speechBuffers = [];  // collected during recording, separate from pre-roll
        let isRecordingSpeech = false;
        let speechStartTime = 0;
        let lastSpeechTime = 0;

        let audioQueue = [];
        let isPlaying = false;
        let currentAudio = null;
        let currentMsgDiv = null;
        let currentMsgText = '';
        let startTime = null;

        // ================= ELEMENTS =================
        const chatArea    = document.getElementById('chatArea');
        const micOrb      = document.getElementById('micOrb');
        const statusLabel = document.getElementById('statusLabel');
        const wsBadge     = document.getElementById('wsBadge');
        const welcomeMsg  = document.getElementById('welcomeMsg');
        const fileInput   = document.getElementById('fileInput');
        const debugLog    = document.getElementById('debugLog');

        function log(msg) {
            console.log('[VA]', msg);
            const line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
            debugLog.appendChild(line);
            debugLog.scrollTop = debugLog.scrollHeight;
            if (debugLog.children.length > 50) debugLog.removeChild(debugLog.firstChild);
        }

        function setState(s) {
            appState = s;
            micOrb.className = 'mic-orb state-' + s;
            statusLabel.className = 'status-label';
            const labels = {
                init: 'Starting microphone...',
                idle: 'Listening...',
                recording: 'Hearing you...',
                processing: 'Thinking...',
                speaking: 'Speaking... (click orb to interrupt)',
            };
            statusLabel.textContent = labels[s] || '';
            if (s === 'recording')  statusLabel.classList.add('recording');
            if (s === 'speaking')   statusLabel.classList.add('speaking');
            if (s === 'processing') statusLabel.classList.add('processing');
            log('State -> ' + s);
        }

        function setWS(ok) {
            wsBadge.textContent = 'WS';
            wsBadge.className = 'ws-badge ' + (ok ? 'on' : 'off');
            log(ok ? 'WS connected' : 'WS disconnected');
        }

        // ================= WAV ENCODER =================

        function encodeWAV(float32, sampleRate) {
            const numSamples = float32.length;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            function writeStr(o, s) {
                for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i));
            }

            writeStr(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeStr(8, 'WAVE');
            writeStr(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeStr(36, 'data');
            view.setUint32(40, numSamples * 2, true);

            let off = 44;
            for (let i = 0; i < numSamples; i++) {
                const s = Math.max(-1, Math.min(1, float32[i]));
                view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                off += 2;
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function concatBuffers(buffers) {
            let total = 0;
            for (const b of buffers) total += b.length;
            const out = new Float32Array(total);
            let off = 0;
            for (const b of buffers) { out.set(b, off); off += b.length; }
            return out;
        }

        // ================= WEBSOCKET =================

        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';
            ws.onopen  = () => setWS(true);
            ws.onclose = () => { setWS(false); setTimeout(connectWS, 3000); };
            ws.onerror = () => log('WS error');
            ws.onmessage = (e) => handleWSMessage(JSON.parse(e.data));
        }

        function handleWSMessage(msg) {
            log('<< ' + msg.type + (msg.message ? ': ' + msg.message : '') + (msg.text ? ': "' + msg.text.substring(0, 40) + '"' : ''));
            switch (msg.type) {
                case 'status':
                    if (msg.stage === 'tts') statusLabel.textContent = msg.message;
                    break;
                case 'transcription':
                    if (welcomeMsg) welcomeMsg.style.display = 'none';
                    addMessage('user', msg.text);
                    break;
                case 'llm_token':
                    appendStreamingText(msg.token);
                    break;
                case 'tts_audio':
                    enqueueAudio(msg.audio_base64, msg.index);
                    break;
                case 'done':
                    finalizeStreamingMessage();
                    if (startTime) addLatencyToLastMessage(((Date.now() - startTime) / 1000).toFixed(1));
                    startTime = null;
                    if (audioQueue.length === 0 && !isPlaying) setState('idle');
                    break;
                case 'error':
                    addError(msg.message);
                    audioQueue = [];
                    stopPlayback();
                    setState('idle');
                    break;
            }
        }

        // ================= STREAMING TEXT =================

        function appendStreamingText(token) {
            if (!currentMsgDiv) currentMsgDiv = createMessageShell('assistant');
            currentMsgText += token;
            const el = currentMsgDiv.querySelector('.text');
            if (el) el.textContent = currentMsgText;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function finalizeStreamingMessage() {
            currentMsgDiv = null;
            currentMsgText = '';
        }

        // ================= AUDIO QUEUE =================

        function enqueueAudio(b64, index) {
            const bytes = base64ToUint8(b64);
            const blob = new Blob([bytes], { type: 'audio/wav' });
            audioQueue.push({ url: URL.createObjectURL(blob), index });
            if (!isPlaying) playNext();
        }

        function playNext() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                if (appState === 'speaking') setState('idle');
                return;
            }
            isPlaying = true;
            setState('speaking');
            audioQueue.sort((a, b) => a.index - b.index);
            const item = audioQueue.shift();
            currentAudio = new Audio(item.url);
            currentAudio.onended = () => { URL.revokeObjectURL(item.url); playNext(); };
            currentAudio.onerror = () => { log('Audio play error'); playNext(); };
            currentAudio.play().catch(e => { log('Audio play rejected: ' + e); playNext(); });
        }

        function stopPlayback() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            isPlaying = false;
            audioQueue.forEach(a => URL.revokeObjectURL(a.url));
            audioQueue = [];
        }

        function base64ToUint8(b64) {
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        // ================= CONTINUOUS MIC (RAW PCM) =================

        async function startContinuousMic() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                addError('Microphone access denied: ' + err.message);
                return;
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            actualSampleRate = audioCtx.sampleRate;
            log('Actual sample rate: ' + actualSampleRate);

            const src = audioCtx.createMediaStreamSource(micStream);
            const bufSize = 4096;
            processor = audioCtx.createScriptProcessor(bufSize, 1, 1);

            const maxSamples = Math.floor(actualSampleRate * BUFFER_SECS);
            let frameCount = 0;

            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const buf = new Float32Array(input);

                // Pre-roll buffer (only keep when not recording)
                if (!isRecordingSpeech) {
                    allBuffers.push(buf);
                    totalSamples += buf.length;
                    while (totalSamples > maxSamples && allBuffers.length > 1) {
                        totalSamples -= allBuffers[0].length;
                        allBuffers.shift();
                    }
                } else {
                    // During recording, collect into speech buffer
                    speechBuffers.push(buf);
                }

                // Energy
                let sum = 0;
                for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
                const rms = Math.sqrt(sum / buf.length);

                frameCount++;
                if (frameCount % 100 === 0) {
                    log('Energy: ' + rms.toFixed(4) + ' state=' + appState + ' speechBufs=' + speechBuffers.length);
                }

                if (appState === 'speaking' && rms > ENERGY_THRESHOLD) {
                    interruptAndRecord();
                    return;
                }

                if (appState === 'idle' && rms > ENERGY_THRESHOLD) {
                    // Start recording: include last pre-roll buffer as onset
                    speechBuffers = [buf];
                    isRecordingSpeech = true;
                    speechStartTime = Date.now();
                    lastSpeechTime = Date.now();
                    setState('recording');
                    log('Speech start');
                }

                if (appState === 'recording') {
                    if (rms > ENERGY_THRESHOLD) {
                        lastSpeechTime = Date.now();
                    }

                    if (Date.now() - lastSpeechTime > SILENCE_MS) {
                        const dur = Date.now() - speechStartTime;
                        if (dur >= MIN_SPEECH_MS) {
                            log('Speech end, duration=' + dur + 'ms, bufs=' + speechBuffers.length);
                            finishUtterance();
                        } else {
                            log('Speech too short (' + dur + 'ms), ignored');
                            isRecordingSpeech = false;
                            speechBuffers = [];
                            setState('idle');
                        }
                    }
                }
            };

            src.connect(processor);
            // Chrome needs destination connection for script processor to fire
            const silentGain = audioCtx.createGain();
            silentGain.gain.value = 0;
            processor.connect(silentGain);
            silentGain.connect(audioCtx.destination);

            setState('idle');
            log('Mic started, listening');
        }

        function interruptAndRecord() {
            log('Interrupt!');
            stopPlayback();
            finalizeStreamingMessage();
            allBuffers = [];
            totalSamples = 0;
            speechBuffers = [];
            isRecordingSpeech = true;
            speechStartTime = Date.now();
            lastSpeechTime = Date.now();
            setState('recording');
        }

        function finishUtterance() {
            isRecordingSpeech = false;

            if (speechBuffers.length === 0) {
                setState('idle');
                return;
            }

            const pcm = concatBuffers(speechBuffers);
            speechBuffers = [];
            allBuffers = [];
            totalSamples = 0;

            log('Sending ' + pcm.length + ' samples (' + (pcm.length / actualSampleRate).toFixed(2) + 's) at ' + actualSampleRate + 'Hz');

            const wav = encodeWAV(pcm, actualSampleRate);
            log('WAV size: ' + wav.size + ' bytes');

            setState('processing');
            startTime = Date.now();
            sendWav(wav);
        }

        async function sendWav(blob) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addError('Not connected');
                setState('idle');
                return;
            }
            try {
                const buf = await blob.arrayBuffer();
                ws.send(buf);
                log('Sent ' + buf.byteLength + ' bytes');
            } catch (err) {
                addError('Send error: ' + err.message);
                setState('idle');
            }
        }

        // ================= FILE UPLOAD =================

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileInput.value = '';

            if (appState === 'speaking') { stopPlayback(); finalizeStreamingMessage(); }
            setState('processing');
            startTime = Date.now();

            try {
                const arrayBuf = await file.arrayBuffer();
                let wavBlob;

                if (file.name.endsWith('.wav')) {
                    wavBlob = file;
                } else {
                    const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuf = await tmpCtx.decodeAudioData(arrayBuf);
                    const pcm = audioBuf.getChannelData(0);
                    wavBlob = encodeWAV(pcm, tmpCtx.sampleRate);
                    tmpCtx.close();
                }
                log('Uploading ' + file.name + ' (' + wavBlob.size + ' bytes)');
                await sendWav(wavBlob);
            } catch (err) {
                addError('File error: ' + err.message);
                setState('idle');
            }
        });

        // ================= ORB CLICK =================

        function onOrbClick() {
            if (appState === 'speaking') {
                stopPlayback();
                finalizeStreamingMessage();
                allBuffers = [];
                totalSamples = 0;
                setState('idle');
            }
        }

        // ================= UI HELPERS =================

        function createMessageShell(role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div><div class="text"></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div><div class="text">${escapeHtml(text)}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLatencyToLastMessage(latency) {
            const msgs = chatArea.querySelectorAll('.message.assistant');
            const last = msgs[msgs.length - 1];
            if (last) {
                let el = last.querySelector('.latency');
                if (!el) { el = document.createElement('div'); el.className = 'latency'; last.appendChild(el); }
                el.textContent = `${latency}s`;
            }
        }

        function addError(text) {
            log('ERROR: ' + text);
            const div = document.createElement('div');
            div.className = 'error-message';
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ================= INIT =================
        connectWS();
        startContinuousMic();
    </script>
</body>
</html>

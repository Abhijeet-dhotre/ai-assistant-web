<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 16px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #2a2a4a;
        }

        header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; letter-spacing: 1px; }

        header .sub {
            font-size: 0.8rem; color: #888; margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .ws-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
        }
        .ws-badge.on  { background: #1b3a1b; color: #4caf50; }
        .ws-badge.off { background: #3a1b1b; color: #f44336; }

        .main-container {
            flex: 1; width: 100%; max-width: 700px;
            display: flex; flex-direction: column; padding: 16px 20px;
        }

        .chat-area {
            flex: 1; overflow-y: auto; padding: 8px 0;
            display: flex; flex-direction: column; gap: 14px;
            min-height: 200px;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 14px;
            font-size: 0.93rem; line-height: 1.5;
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a73e8, #4285f4);
            color: #fff; border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e3a; border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px; opacity: 0.5;
        }

        .message .text { word-wrap: break-word; }
        .message .latency { font-size: 0.65rem; color: #555; margin-top: 4px; }

        /* ---- Bottom bar ---- */

        .bottom-bar {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 20px 24px; gap: 10px;
        }

        /* Mic orb */
        .mic-orb {
            width: 72px; height: 72px; border-radius: 50%;
            border: 3px solid #333; background: #111;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; outline: none;
            position: relative;
        }

        .mic-orb .icon { font-size: 1.8rem; transition: color 0.3s; }

        /* States */
        .mic-orb.state-init    { border-color: #555; }
        .mic-orb.state-init .icon { color: #555; }

        .mic-orb.state-idle    { border-color: #4caf50; box-shadow: 0 0 12px rgba(76,175,80,0.25); }
        .mic-orb.state-idle .icon { color: #4caf50; }

        .mic-orb.state-recording {
            border-color: #f44336; animation: pulse-rec 1s infinite;
        }
        .mic-orb.state-recording .icon { color: #f44336; }

        .mic-orb.state-processing { border-color: #ff9800; animation: pulse-proc 1.5s infinite; }
        .mic-orb.state-processing .icon { color: #ff9800; }

        .mic-orb.state-speaking {
            border-color: #2196f3; box-shadow: 0 0 16px rgba(33,150,243,0.3);
            cursor: pointer;
        }
        .mic-orb.state-speaking .icon { color: #2196f3; }

        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.4); }
            70% { box-shadow: 0 0 0 18px rgba(244,67,54,0); }
        }

        @keyframes pulse-proc {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,152,0,0.3); }
            70% { box-shadow: 0 0 0 14px rgba(255,152,0,0); }
        }

        /* Energy ring */
        .energy-ring {
            position: absolute; inset: -6px; border-radius: 50%;
            border: 2px solid transparent; transition: border-color 0.2s;
            pointer-events: none;
        }

        .mic-orb.state-recording .energy-ring {
            border-color: rgba(244,67,54,0.3);
        }

        /* Status label */
        .status-label {
            font-size: 0.78rem; color: #888; text-align: center;
            min-height: 1.2em; transition: color 0.2s;
        }
        .status-label.recording { color: #f44336; }
        .status-label.speaking  { color: #2196f3; }
        .status-label.processing { color: #ff9800; }

        .error-message {
            background: #2a1010; border: 1px solid #5a2020;
            color: #f44336; padding: 10px 14px; border-radius: 8px;
            font-size: 0.82rem; text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }

        .welcome {
            text-align: center; padding: 50px 20px; color: #555;
        }
        .welcome .icon { font-size: 3.5rem; margin-bottom: 12px; }
        .welcome p { font-size: 0.9rem; line-height: 1.6; }

        @media (max-width: 480px) {
            header h1 { font-size: 1.15rem; }
            .message { max-width: 92%; padding: 10px 13px; font-size: 0.88rem; }
            .mic-orb { width: 64px; height: 64px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Voice Assistant</h1>
        <div class="sub">
            Whisper + Groq + Pocket TTS
            <span class="ws-badge off" id="wsBadge">WS</span>
        </div>
    </header>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeMsg">
                <div class="icon">&#127908;</div>
                <p>Always listening. Just speak naturally.<br>
                I'll hear you, think, and talk back.<br>
                Click the orb while I'm speaking to interrupt.</p>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="status-label" id="statusLabel">Connecting...</div>
        <button class="mic-orb state-init" id="micOrb" onclick="onOrbClick()">
            <div class="energy-ring" id="energyRing"></div>
            <span class="icon">&#127908;</span>
        </button>
    </div>

    <script>
        // ================= CONFIG =================
        const WS_PORT = 5051;
        const WS_URL  = `ws://${location.hostname}:${WS_PORT}/ws`;

        const ENERGY_THRESHOLD = 20;     // RMS 0-255, tune for your mic
        const SILENCE_MS       = 800;    // silence duration to end speech
        const MIN_SPEECH_MS    = 400;    // ignore shorter utterances
        const FFT_SIZE         = 512;

        // ================= STATE =================
        // 'init' | 'idle' | 'recording' | 'processing' | 'speaking'
        let appState = 'init';

        let ws = null;
        let audioCtx = null;
        let analyser = null;
        let micStream = null;
        let mediaRecorder = null;
        let allChunks = [];        // every chunk from the always-on recorder
        let speechStartIdx = -1;   // index of first chunk in current utterance
        let speechStartTime = 0;
        let lastSpeechTime = 0;

        let audioQueue = [];
        let isPlaying = false;
        let currentAudio = null;
        let currentMsgDiv = null;
        let currentMsgText = '';
        let startTime = null;

        // ================= ELEMENTS =================
        const chatArea     = document.getElementById('chatArea');
        const micOrb       = document.getElementById('micOrb');
        const energyRing   = document.getElementById('energyRing');
        const statusLabel  = document.getElementById('statusLabel');
        const wsBadge      = document.getElementById('wsBadge');
        const welcomeMsg   = document.getElementById('welcomeMsg');

        // ================= HELPERS =================

        function setState(s) {
            appState = s;
            micOrb.className = 'mic-orb state-' + s;
            statusLabel.className = 'status-label';

            switch (s) {
                case 'init':
                    statusLabel.textContent = 'Starting microphone...';
                    break;
                case 'idle':
                    statusLabel.textContent = 'Listening...';
                    break;
                case 'recording':
                    statusLabel.textContent = 'Hearing you...';
                    statusLabel.classList.add('recording');
                    break;
                case 'processing':
                    statusLabel.textContent = 'Thinking...';
                    statusLabel.classList.add('processing');
                    break;
                case 'speaking':
                    statusLabel.textContent = 'Speaking... (click to interrupt)';
                    statusLabel.classList.add('speaking');
                    break;
            }
        }

        function setWS(connected) {
            wsBadge.textContent = 'WS';
            wsBadge.className = 'ws-badge ' + (connected ? 'on' : 'off');
        }

        // ================= WEBSOCKET =================

        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onopen    = () => setWS(true);
            ws.onclose   = () => { setWS(false); setTimeout(connectWS, 3000); };
            ws.onerror   = () => {};

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleWSMessage(msg);
            };
        }

        function handleWSMessage(msg) {
            switch (msg.type) {
                case 'status':
                    if (msg.stage === 'tts') {
                        statusLabel.textContent = msg.message;
                    }
                    break;

                case 'transcription':
                    if (welcomeMsg) { welcomeMsg.style.display = 'none'; }
                    addMessage('user', msg.text);
                    break;

                case 'llm_token':
                    appendStreamingText(msg.token);
                    break;

                case 'tts_audio':
                    enqueueAudio(msg.audio_base64, msg.index);
                    break;

                case 'done':
                    finalizeStreamingMessage();
                    if (startTime) {
                        addLatencyToLastMessage(((Date.now() - startTime) / 1000).toFixed(1));
                    }
                    startTime = null;
                    // Don't change state here — audio queue will set idle when done
                    if (audioQueue.length === 0 && !isPlaying) {
                        setState('idle');
                    }
                    break;

                case 'error':
                    addError(msg.message);
                    audioQueue = [];
                    stopPlayback();
                    setState('idle');
                    break;
            }
        }

        // ================= STREAMING TEXT =================

        function appendStreamingText(token) {
            if (!currentMsgDiv) currentMsgDiv = createMessageShell('assistant');
            currentMsgText += token;
            const el = currentMsgDiv.querySelector('.text');
            if (el) el.textContent = currentMsgText;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function finalizeStreamingMessage() {
            currentMsgDiv = null;
            currentMsgText = '';
        }

        // ================= AUDIO QUEUE =================

        function enqueueAudio(b64, index) {
            const bytes = base64ToUint8(b64);
            const blob = new Blob([bytes], { type: 'audio/wav' });
            const url  = URL.createObjectURL(blob);
            audioQueue.push({ url, index });

            if (!isPlaying) playNext();
        }

        function playNext() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                if (appState === 'speaking') setState('idle');
                return;
            }
            isPlaying = true;
            setState('speaking');

            audioQueue.sort((a, b) => a.index - b.index);
            const item = audioQueue.shift();

            currentAudio = new Audio(item.url);
            currentAudio.onended = () => { URL.revokeObjectURL(item.url); playNext(); };
            currentAudio.onerror = () => playNext();
            currentAudio.play().catch(() => playNext());
        }

        function stopPlayback() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            isPlaying = false;
            audioQueue.forEach(a => URL.revokeObjectURL(a.url));
            audioQueue = [];
        }

        function base64ToUint8(b64) {
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        // ================= CONTINUOUS MIC =================

        async function startContinuousMic() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                addError('Microphone access denied. Please allow mic and reload.');
                return;
            }

            audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(micStream);
            analyser  = audioCtx.createAnalyser();
            analyser.fftSize = FFT_SIZE;
            src.connect(analyser);

            // Always-on recorder
            const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
            mediaRecorder = new MediaRecorder(micStream, { mimeType: mime });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) allChunks.push(e.data);
            };

            mediaRecorder.start(200); // 200ms timeslice

            setState('idle');
            monitorEnergy();
        }

        function monitorEnergy() {
            const data = new Uint8Array(analyser.frequencyBinCount);
            const SILENCE_WINDOW = 8;  // consecutive low-energy frames to confirm silence
            let silenceCount = 0;

            function tick() {
                if (appState === 'init' || appState === 'processing') {
                    requestAnimationFrame(tick);
                    return;
                }

                analyser.getByteTimeDomainData(data);

                // RMS energy
                let sum = 0;
                for (let i = 0; i < data.length; i++) {
                    const v = (data[i] - 128) / 128;
                    sum += v * v;
                }
                const rms = Math.sqrt(sum / data.length) * 255;

                // Update energy ring visual
                if (appState === 'recording') {
                    const intensity = Math.min(rms / ENERGY_THRESHOLD, 2);
                    energyRing.style.borderColor = `rgba(244,67,54,${0.15 + intensity * 0.2})`;
                }

                if (appState === 'speaking' && rms > ENERGY_THRESHOLD) {
                    // Interrupt: user started speaking while assistant is talking
                    interruptAndRecord();
                    requestAnimationFrame(tick);
                    return;
                }

                if (appState === 'idle' && rms > ENERGY_THRESHOLD) {
                    // Speech onset
                    speechStartIdx = allChunks.length;
                    speechStartTime = Date.now();
                    lastSpeechTime = Date.now();
                    silenceCount = 0;
                    setState('recording');
                }

                if (appState === 'recording') {
                    if (rms > ENERGY_THRESHOLD) {
                        lastSpeechTime = Date.now();
                        silenceCount = 0;
                    } else {
                        silenceCount++;
                    }

                    if (Date.now() - lastSpeechTime > SILENCE_MS) {
                        // Silence detected — end utterance
                        const duration = Date.now() - speechStartTime;
                        if (duration >= MIN_SPEECH_MS) {
                            finishUtterance();
                        } else {
                            // Too short, discard
                            setState('idle');
                        }
                    }
                }

                requestAnimationFrame(tick);
            }

            requestAnimationFrame(tick);
        }

        function interruptAndRecord() {
            stopPlayback();
            finalizeStreamingMessage();

            // Discard any in-flight processing result
            speechStartIdx = allChunks.length;
            speechStartTime = Date.now();
            lastSpeechTime = Date.now();
            setState('recording');
        }

        function finishUtterance() {
            if (speechStartIdx < 0 || speechStartIdx >= allChunks.length) {
                setState('idle');
                return;
            }

            const chunks = allChunks.slice(speechStartIdx);
            speechStartIdx = -1;

            if (chunks.length === 0) {
                setState('idle');
                return;
            }

            const blob = new Blob(chunks, { type: mediaRecorder.mimeType });

            // Trim old chunks to keep memory low (keep last 2 seconds worth ≈ 10 chunks at 200ms)
            if (allChunks.length > 20) {
                allChunks = allChunks.slice(-10);
            }

            setState('processing');
            startTime = Date.now();
            sendAudio(blob);
        }

        // ================= SEND =================

        async function sendAudio(blob) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addError('Not connected');
                setState('idle');
                return;
            }
            try {
                const buf = await blob.arrayBuffer();
                ws.send(buf);
            } catch (err) {
                addError('Send error: ' + err.message);
                setState('idle');
            }
        }

        // ================= ORB CLICK =================

        function onOrbClick() {
            if (appState === 'speaking') {
                interruptAndRecord();
            }
        }

        // ================= UI HELPERS =================

        function createMessageShell(role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div><div class="text"></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div><div class="text">${escapeHtml(text)}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLatencyToLastMessage(latency) {
            const msgs = chatArea.querySelectorAll('.message.assistant');
            const last = msgs[msgs.length - 1];
            if (last) {
                let el = last.querySelector('.latency');
                if (!el) { el = document.createElement('div'); el.className = 'latency'; last.appendChild(el); }
                el.textContent = `${latency}s`;
            }
        }

        function addError(text) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ================= INIT =================
        connectWS();
        startContinuousMic();
    </script>
</body>
</html>
